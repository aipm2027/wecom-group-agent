name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12"]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Syntax check (全量 py_compile)
        run: python -m compileall -q main.py api_server.py core adapters tests examples

      - name: Import smoke (入口模块可导入)
        run: python -c "import main, api_server; main.build_knowledge()"

      - name: Run tests
        run: |
          for f in tests/test_*.py; do
            echo "== $f =="
            python "$f" || exit 1
          done
