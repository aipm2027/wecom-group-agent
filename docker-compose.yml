# 生产双服务:agent(微信客服接入)+ api(运营 REST API)。
#
#   cp .env.example .env && 填好密钥
#   docker compose up -d
#   docker compose logs -f agent
#
# 两个服务共享 agent-data 卷:STORE=sqlite 同库(WAL 已开,双进程安全)、
# WECOM_TOKEN_FILE 共享 access_token(见 adapters/wecom_kf.py 跨进程共享)。
services:
  agent:
    build: .
    image: wecom-group-agent
    command: python3 main.py
    env_file: .env
    environment:            # 生产形态固化(覆盖 .env 中同名项)
      ADAPTER: ${ADAPTER:-aibot}   # 默认智能机器人(已真机验证);微信客服部署在 .env 设 ADAPTER=kf
      HANDLER: llm
      STORE: sqlite
      SQLITE_PATH: /app/data/sessions.db
      WECOM_TOKEN_FILE: /app/data/wecom_kf_token.json
      AGENT_STATS_FILE: /app/data/agent_stats.json   # P2-8:运行时计数器,经共享卷给 api 读
      WECOM_AIBOT_OUTBOX: /app/data/aibot_outbox.jsonl  # 人工回复跨进程桥(api 写,agent 代发)
    ports:
      - "9000:9000"          # 仅 ADAPTER=kf 需要(公网回调);aibot 走出站长连接,无入站端口
    volumes:
      - agent-data:/app/data
    restart: on-failure:3  # 配置错误 exit 2 不无限循环;瞬时崩溃仍自愈(#13C)
    stop_grace_period: 15s   # main.py 已处理 SIGTERM 优雅退出

  api:
    build: .
    image: wecom-group-agent
    command: python3 api_server.py
    env_file: .env
    environment:
      ADAPTER: ${ADAPTER:-aibot}   # 与 agent 保持一致:api 的人工回复经 adapter 桥接下发
      STORE: sqlite
      SQLITE_PATH: /app/data/sessions.db
      AGENT_STATS_FILE: /app/data/agent_stats.json   # 读 agent 落盘的计数器,进 /api/metrics
      WECOM_AIBOT_OUTBOX: /app/data/aibot_outbox.jsonl  # 同一共享卷,写入由 agent 代发
      API_HOST: 0.0.0.0      # 容器内必须 0.0.0.0 才能被端口映射到宿主机
      API_PORT: "8080"
    ports:
      - "127.0.0.1:8080:8080"  # 只绑宿主机回环:运营 API 不直接暴露公网,走 SSH 隧道或反代加鉴权
    volumes:
      - agent-data:/app/data
    restart: on-failure:3  # 配置错误 exit 2 不无限循环;瞬时崩溃仍自愈(#13C)
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/api/health', timeout=3)"]
      interval: 30s
      timeout: 5s
      retries: 3

  console:
    build: .
    image: wecom-group-agent
    command: python3 admin_console.py
    env_file: .env             # 用到 ADMIN_TOKEN(服务端注入)与 CONSOLE_PASSWORD
    environment:
      API_BASE: http://api:8080   # 走 compose 内网直达 api 服务
      CONSOLE_HOST: 0.0.0.0
      CONSOLE_PORT: "8090"
    ports:
      - "127.0.0.1:8090:8090"  # 与 api 同策略:只绑回环,运营者走 SSH 隧道/反代访问
    depends_on:
      - api
    restart: on-failure:3  # 配置错误 exit 2 不无限循环;瞬时崩溃仍自愈(#13C)

volumes:
  agent-data:
